<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Misty — Dreamline Corpus Explorer</title>
<style>
:root {
  --bg:      #ffffff;  --bg2: #f8f8f6;  --bg3: #f1efe8;
  --text:    #1a1a18;  --t2:  #5f5e5a;  --t3:  #9c9a92;
  --border:  rgba(0,0,0,0.10);
  --border2: rgba(0,0,0,0.22);
  --radius:  8px;
  --purple:  #534AB7;  --purple-l: #EEEDFE;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:      #1a1a18;  --bg2: #242422;  --bg3: #2c2c2a;
    --text:    #e8e6de;  --t2:  #9c9a92;  --t3:  #5f5e5a;
    --border:  rgba(255,255,255,0.10);
    --border2: rgba(255,255,255,0.22);
    --purple-l: #26215C;
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 13px; line-height: 1.5;
  background: var(--bg); color: var(--text);
  padding: 24px 20px; max-width: 980px; margin: 0 auto;
}
h1 { font-size: 17px; font-weight: 500; margin-bottom: 3px; }
.subtitle { font-size: 12px; color: var(--t2); margin-bottom: 20px; }
.lbl {
  font-size: 10px; color: var(--t3);
  text-transform: uppercase; letter-spacing: .06em;
  margin: 16px 0 5px;
}
/* Toolbar */
.toolbar {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: 16px; flex-wrap: wrap;
}
.toolbar input {
  flex: 1; min-width: 160px;
  padding: 6px 10px;
  border: 0.5px solid var(--border2); border-radius: var(--radius);
  background: var(--bg); color: var(--text); font-size: 13px;
  outline: none;
}
.toolbar input:focus { border-color: var(--purple); }
/* Timeline */
#tl-wrap { position: relative; margin-bottom: 3px; }
#tl { width: 100%; display: block; overflow: visible; }
.tl-bar { cursor: pointer; transition: opacity .1s; }
.tl-bar:hover { filter: brightness(1.18); }
.axis {
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--t3); margin-bottom: 12px;
}
/* Tooltip */
#tip {
  position: absolute; top: -30px;
  background: var(--bg); border: 0.5px solid var(--border2);
  border-radius: 6px; font-size: 11px; padding: 5px 9px;
  pointer-events: none; white-space: nowrap; z-index: 50; display: none;
}
/* Lanes */
#lanes-wrap { position: relative; margin-bottom: 16px; }
#lanes { position: relative; }
.lane {
  position: absolute; border-radius: 3px;
  cursor: pointer; display: flex; align-items: center;
  padding: 0 5px; overflow: hidden; transition: filter .12s;
}
.lane:hover { filter: brightness(1.15); }
.lane-lbl {
  font-size: 9px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
/* Detail panels */
.panels {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.panel {
  border: 0.5px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; min-height: 200px;
}
.panel h3 { font-size: 13px; font-weight: 500; margin-bottom: 10px; }
.empty { color: var(--t3); font-size: 12px; text-align: center; padding: 50px 0; }
/* Stats row */
.stats { display: flex; gap: 8px; margin-bottom: 12px; }
.stat {
  flex: 1; background: var(--bg2); border-radius: 6px;
  padding: 6px 8px; text-align: center;
}
.stat-val { font-size: 18px; font-weight: 500; }
.stat-lbl { font-size: 10px; color: var(--t3); }
/* Pills */
.pill {
  display: inline-block; font-size: 10px;
  padding: 2px 7px; border-radius: 12px;
  margin: 2px 2px 2px 0; font-weight: 500;
}
/* Term bars */
.term-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.term-name { font-size: 11px; color: var(--t2); min-width: 80px; }
.term-name.dream { color: var(--text); font-weight: 500; }
.term-bg { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.term-fill { height: 100%; border-radius: 3px; }
.term-ct { font-size: 10px; color: var(--t3); min-width: 22px; text-align: right; }
/* Page heatmap */
.pg-cell {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 2px; margin: 1px; vertical-align: top;
}
/* Mini dreamline in story panel */
.mini-bar { flex: 1; border-radius: 1px 1px 0 0; min-width: 0; }
@media (max-width: 600px) { .panels { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>Misty — Dreamline Corpus Explorer</h1>
<p class="subtitle">
  Dream-language density across all 101 issues &nbsp;·&nbsp;
  generated from OCR text &amp; Scrivener story index

<div class="toolbar">

<div id="tl-wrap">

  <div id="tip"></div>
</div>
<div class="axis">
  <span>Issue 1</span><span>25</span><span>50</span><span>75</span><span>101</span>

<div class="lbl">Running stories — click a span to explore</div>
<div id="lanes-wrap"><div id="lanes"></div></div>

<div class="panels">

  </div>
  <div class="panel">

    <div class="empty" id="story-empty">Click a story span above</div>
    <div id="story-body"></div>
  </div>
</div>

const N_ISSUES     = 101;
const DREAM_WORDS  = ["afraid", "asleep", "awake", "awoken", "curse", "cursed", "cursing", "dark", "darkness", "dream", "dreamed", "dreaming", "dreams", "dreamt", "fear", "feared", "fearful", "fearing", "ghost", "ghostly", "magic", "magical", "mind", "minds", "nightmare", "nightmares", "omen", "omens", "prophecies", "prophecy", "prophetic", "real", "reality", "shadow", "shadows", "sleep", "sleeping", "sleepy", "slept", "spell", "spirit", "spirits", "strange", "strangely", "supernatural", "trance", "unconscious", "unreal", "vision", "visionary", "visions", "wake", "waking", "woke"];

/* ── Helpers ── */
const DREAM_SET = new Set(DREAM_WORDS);
const isDream   = w => DREAM_SET.has(w.toLowerCase());
const dc        = n => { const v = DREAM_COUNTS[n] ?? DREAM_COUNTS[String(n)]; return v ?? null; };
const storiesAt = n => STORIES.filter(s => n >= s.first && n <= s.last);
const maxDream  = Math.max(1, ...Object.values(DREAM_COUNTS).filter(v => v !== null));

/* ── Timeline ── */
const svgEl   = document.getElementById('tl');
const tipEl   = document.getElementById('tip');
const tlWrap  = document.getElementById('tl-wrap');
const bars    = [];
let searchQ    = '';

function drawTimeline() {
  const W  = svgEl.clientWidth || 900;
  const H  = 80;
  const bw = (W - N_ISSUES) / N_ISSUES;   // bar width (gap of 1px between)
  svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svgEl.innerHTML = '';
  bars.length = 0;

  for (let i = 0; i < N_ISSUES; i++) {
    const n   = i + 1;
    const cnt = dc(n);
    const h   = cnt === null ? 3 : Math.max(2, Math.round((cnt / maxDream) * 70));
    const x   = i * (bw + 1);
    const ss  = storiesAt(n);
    const col = cnt === 0 ? 'var(--border2)' : (ss.length ? ss[0].bg : '#378ADD');

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x',      x.toFixed(1));
    rect.setAttribute('y',      (H - h).toFixed(1));
    rect.setAttribute('width',  bw.toFixed(1));
    rect.setAttribute('height', h);
    rect.setAttribute('rx',     '1.5');
    rect.setAttribute('fill',   col);
    rect.setAttribute('class',  'tl-bar');
    rect.style.opacity = (cnt === 0 || cnt === null) ? '0.22' : '1';
    rect.dataset.n = n;

    rect.addEventListener('mouseenter', () => {
      const ss2 = storiesAt(n).map(s => s.title).join(', ') || '—';
      const label = cnt === null ? 'not yet OCR\'d'
                  : `${cnt} dream mention${cnt !== 1 ? 's' : ''}`;
      tipEl.style.display = 'block';
      tipEl.innerHTML = `<strong>Issue ${n}</strong> &nbsp; ${label} &nbsp;·&nbsp; ${ss2}`;
      tipEl.style.left = '0';  // temporary — lets us measure real width
      const br  = rect.getBoundingClientRect();
      const wr  = tlWrap.getBoundingClientRect();
      const tipW = tipEl.offsetWidth;
      let left = br.left - wr.left - 30;
      left = Math.max(4, Math.min(left, wr.width - tipW - 4));
      tipEl.style.left = left + 'px';
    });
    rect.addEventListener('mouseleave', () => tipEl.style.display = 'none');
    rect.addEventListener('click', () => {
      bars.forEach(b => { b.style.stroke = ''; b.style.strokeWidth = ''; });
      rect.style.stroke = 'var(--text)';
      rect.style.strokeWidth = '2';
      renderIssue(n);
    });

    svgEl.appendChild(rect);
    bars.push(rect);
  }
  applyFilter();
}

/* ── Jump to issue from any context (e.g. mini-bar click) ── */
function jumpToIssue(n) {
  const rect = bars[n - 1];
  if (!rect) return;
  bars.forEach(b => { b.style.stroke = ''; b.style.strokeWidth = ''; });
  rect.style.stroke = 'var(--text)';
  rect.style.strokeWidth = '2';
  renderIssue(n);
}

/* ── Lanes ── */
const lanesEl = document.getElementById('lanes');
const LANE_H  = 14;
const LANE_G  = 3;

function drawLanes() {
  const W = lanesEl.parentElement.clientWidth || 900;
  lanesEl.innerHTML = '';

  // Greedy row-packing: each story goes in the first row it fits
  const rowEnds = [];
  const assigned = STORIES.map(s => {
    let row = rowEnds.findIndex(end => end < s.first);
    if (row === -1) { row = rowEnds.length; rowEnds.push(0); }
    rowEnds[row] = s.last;
    return row;
  });
  lanesEl.style.height = (rowEnds.length * (LANE_H + LANE_G)) + 'px';

  STORIES.forEach((s, i) => {
    const el    = document.createElement('div');
    el.className = 'lane';
    const left  = ((s.first - 1) / N_ISSUES) * W;
    const width = Math.max(4, ((s.last - s.first + 1) / N_ISSUES) * W);
    el.style.cssText = `
      left: ${left}px; width: ${width}px;
      top: ${assigned[i] * (LANE_H + LANE_G)}px;
      height: ${LANE_H}px;
      background: ${s.bg}28;
      border-left: 3px solid ${s.bg};
    `;
    const lbl = document.createElement('span');
    lbl.className   = 'lane-lbl';
    lbl.style.color = s.bg;
    lbl.textContent = s.title;
    el.appendChild(lbl);
    el.addEventListener('click', () => renderStory(s));
    lanesEl.appendChild(el);
  });
}

            </div>
          </div>
          <div class="term-ct">${count}</div>
        </div>`;
      }).join('')
    : `<p style="color:var(--t3);font-size:12px">
         Term data unavailable — run build.py after OCR completes.
       </p>`;

  const pageHeat = pages.length
    ? `<div style="font-size:10px;color:var(--t3);margin:8px 0 3px">
         Dream mentions by page
       </div>
       <div>${pages.map((v, p) => {
         const a = v === 0 ? 0.07 : 0.18 + (v / maxP) * 0.72;
         return `<div class="pg-cell"
                      data-tip="Page ${p + 1}: ${v} mention${v !== 1 ? 's' : ''}"
                      style="background:rgba(83,74,183,${a.toFixed(2)})"></div>`;
       }).join('')}</div>`
    : '';

  document.getElementById('issue-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <span class="pill" style="background:${pillBg};color:${pillFg}">${cntLabel}</span>
      ${storyPills}
    </div>
    ${termRows}
    ${pageHeat}
  `;
}

/* ── Story panel ── */
function renderStory(s) {
  document.getElementById('story-h').textContent = s.title;
  document.getElementById('story-empty').style.display = 'none';

  const nums   = s.issues;
  const counts = nums.map(n => dc(n) || 0);
  const total  = counts.reduce((a, b) => a + b, 0);
  const avg    = (total / nums.length).toFixed(1);
  const maxC   = Math.max(1, ...counts);
  const peakN  = nums[counts.indexOf(Math.max(...counts))];

  const miniLine = counts.map((c, i) => {
    const h = Math.max(1, Math.round((c / maxC) * 28));
    const n = nums[i];
    return `<div class="mini-bar"
                 data-tip="Issue ${n}: ${c} mention${c !== 1 ? 's' : ''}"
                 onclick="jumpToIssue(${n})"
                 style="height:${h}px;background:${s.bg};cursor:pointer;
                        opacity:${c === 0 ? 0.18 : 0.5 + (c / maxC) * 0.5}">
            </div>`;
  }).join('');

  const tagPills = s.tags.length
    ? s.tags.map(t =>
        `<span class="pill" style="background:${s.bg}18;color:${s.bg}">${t}</span>`
      ).join('')
    : `<span style="color:var(--t3)">No tags</span>`;

  const summaryHtml = s.summary
    ? `<details style="margin-top:10px">
         <summary style="font-size:11px;color:var(--t2);cursor:pointer;user-select:none">
           Plot summary
         </summary>
         <p style="font-size:11px;color:var(--t2);line-height:1.6;margin-top:6px;
                   border-left:2px solid var(--border2);padding-left:8px">${s.summary}</p>
       </details>`
    : '';

  const artist = s.artist
    ? `<span style="color:var(--t2)">&nbsp;·&nbsp; ${s.artist}</span>`
    : '';

  document.getElementById('story-body').innerHTML = `
    <div class="stats">
      <div class="stat">
        <div class="stat-val">${nums.length}</div>
        <div class="stat-lbl">issues</div>
      </div>
      <div class="stat">
        <div class="stat-val">${avg}</div>
        <div class="stat-lbl">avg dream/issue</div>
      </div>
      <div class="stat">
        <div class="stat-val">${peakN}</div>
        <div class="stat-lbl">peak issue</div>
      </div>
      <div class="stat">
        <div class="stat-val">${total}</div>
        <div class="stat-lbl">total mentions</div>
      </div>
    </div>
    <div style="font-size:10px;color:var(--t3);margin-bottom:2px">
      Dream density across run (issues ${s.first}–${s.last})
    </div>
    <div style="display:flex;align-items:flex-end;gap:1px;height:32px;margin-bottom:10px">
      ${miniLine}
    </div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:8px">
      Issues ${s.first}–${s.last}${artist}
      ${s.writer ? ` &nbsp;·&nbsp; <strong style="color:var(--text)">Writer:</strong> ${s.writer}` : ''}
      ${s.serial ? ` &nbsp;·&nbsp; ${s.serial}` : ''}
    </div>
    <div style="margin-bottom:6px">${tagPills}</div>
    ${summaryHtml}
  `;
}

/* ── Search ── */
function onSearch(q) {
  searchQ = q.trim().toLowerCase();
  applyFilter();
}

function applyFilter() {
  bars.forEach((rect, i) => {
    const n   = i + 1;
    const cnt = dc(n);

    if (!searchQ) {
      rect.style.opacity = (cnt === 0 || cnt === null) ? '0.22' : '1';
      return;
    }

    // Dream-family words: match against raw mention count
    // Other words: match against TF-IDF top terms
    const isDreamSearch = Array.from(DREAM_SET).some(
      w => w.startsWith(searchQ) || searchQ === w
    );
    const match = isDreamSearch
      ? (cnt !== null && cnt > 0)
      : (TOP_TERMS[n] || TOP_TERMS[String(n)] || []).some(t => t[0].includes(searchQ));

    rect.style.opacity = match
      ? ((cnt === 0 || cnt === null) ? '0.22' : '1')
      : '0.06';
  });
}

/* ── Page-cell instant tooltip ── */
const pgTip = document.getElementById('pg-tip');
document.addEventListener('mouseover', e => {
  const el = e.target.closest('[data-tip]');
  if (!el) { pgTip.style.display = 'none'; return; }
  pgTip.textContent = el.dataset.tip;
  pgTip.style.display = 'block';
  pgTip.style.left = (e.clientX + 12) + 'px';
  pgTip.style.top  = (e.clientY - 28) + 'px';
});
document.addEventListener('mousemove', e => {
  if (pgTip.style.display === 'none') return;
  pgTip.style.left = (e.clientX + 12) + 'px';
  pgTip.style.top  = (e.clientY - 28) + 'px';
});
document.addEventListener('mouseout', e => {
  if (!e.target.closest('[data-tip]')) return;
  pgTip.style.display = 'none';
});

/* ── Resize ── */
function redraw() {
  drawTimeline();
  lanesEl.innerHTML = '';
  drawLanes();
}

window.addEventListener('load',   redraw);
window.addEventListener('resize', redraw);
</script>
