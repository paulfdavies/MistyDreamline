‘Now you know my secret – and now just leave me alone to find what peace I can!’ ‘His secret in the box…just the remnants of his tragic life…!’", "tags": [], "tagged": false, "bg": "#854F0B", "fg": "#FAEEDA"}, {"title": "Run, Rabbit, Run!", "issues": [64], "first": 64, "last": 64, "artist": "José Canovas", "writer": "", "serial": "Single", "summary": "Emily is called rabbit and bullied at school, saves a wild rabbit from snare and finally stands up for self, rabbits calls friends and they terrify the bully and she realises she is not afraid any more", "tags": [], "tagged": false, "bg": "#185FA5", "fg": "#E6F1FB"}, {"title": "To See A Vampire!", "issues": [64], "first": 64, "last": 64, "artist": "Karen and Eric (brother?) scared by vampire film, he accidentally kills one in graveyard with choc-ice stick (nice debunking in second paragraph).", "writer": "", "serial": "Single", "summary": "", "tags": [], "tagged": false, "bg": "#3B6D11", "fg": "#EAF3DE"}, {"title": "An Eye For An Eye", "issues": [65], "first": 65, "last": 65, "artist": "Jorge Badia Romero", "writer": "", "serial": "Single", "summary": "Slave Esther has a cruel mistress who captures leopards and treats them badly and kills one for skin, takes the other to Rome but the leopard roars and attracts attention of Arab pirates on a Dhow (African ship) who take them prisoner and release the leopard, Livia ends up sold as a slave.", "tags": [], "tagged": false, "bg": "#72243E", "fg": "#FBEAF0"}, {"title": "Evil Djinn, The", "issues": [65], "first": 65, "last": 65, "artist": "John Armstrong", "writer": "", "serial": "Single", "summary": "Kitty saves a genie from choking and gets some cursed wishes (sister dies and gets money, then sister lives but is invalid) but outwits her ultimately with third wish by wishing she had never met her.", "tags": [], "tagged": false, "bg": "#5F5E5A", "fg": "#F1EFE8"}, {"title": "Nightmare Academy", "issues": [65, 66, 67, 68, 69, 70, 71, 72, 73, 74, 75, 76], "first": 65, "last": 76, "artist": "Jaime Rumeu ('Homero')", "writer": "", "serial": "Serial", "summary": "[65] [Big splash page start] Sharon goes to boarding school when father gets oil job in UAE, gets train there but nobody to meet her at station, walks to the school but finds it deserted except for angry dogs (‘What horrible creatures…!’) and then meets mysterious teacher. [66] Head (Miss Nocturne) confiscates Sharon’s mirror and she discovers they all sleep by day and have classes at night (dogs called Belial, Baal and Mordred), sees something moving out of window but can’t stay awake in class. [67] Sharon is sent to bed, wakes up at midday and goes looking for food, finds gravestone with head girl’s name on it, meets caretaker’s daughter Fiona who mysteriously disappears, Sharon hides from head then follows her into old chapel, but only finds bats. [68] Bats fly off and Miss Nocturne appears on roof and catches her, sets her to scrubbing the kitchen with guard dog. Sharon muses ‘She seems perfectly reasonable. Maybe a bit eccentric, but sort of … creepy, too!’ Yvonne brings her cake later and Sharon escapes from room and see Miss Nocturne go off in a carriage. [69] Sharon sees coach drive off, Rowena catches her (cold hands, strong grip) and tells her place may be haunted by vengeful spirits, takes her to forbidden vault to scare her, then to dinner where Yvonne tells her that the staff and prefects don’t eat and sometimes students are ‘sent for’ to join them. Miss Nocturne announces that the following girls have been sent for. [70] Sharon writes a desperate letter to parents but its confiscated and taken to head. She threatens to burn letter from her parents so Sharon tells her suspicions, Miss Nocturne blames it on anaemia and makes her drink a tonic, Sharon feels herself falling and sees Miss Nocturne turn into a bat. [71] Sharon has nightmare of coffin and Miss Nocturne (with fangs) telling her she is undead and Sharon must join them by way of blood, wakes to find herself trapped in dungeon and gets Fiona to take a note to her father to help her escape, but it is Miss Nocturne who returns to let her out. [72] Sharon wonders if she is being too suspicious, but then hears Yvonne has been ‘sent for’ and resolves to find out what happened to her, meets Fiona and learns how to operate portcullis (dangerous!) then bumps into Yvonne (face hidden). [73] Yvonne is ‘Like somebody who has been hypnotised…!’ and with super-strength; Fiona tells Sharon she has become a ‘watcher’ who guards place in daylight. Sharon gives Fiona letter for her dad to post and she and Yvonne (who is watching her) discover antique coach, Miss Nocturne then appears and takes Sharon for a ride in it (‘It’s – it’s so icily cold in here.’) [74] Sharon caught exploring stables taken on breakneck carriage ride by Miss Nocturne, slips and cuts head, Miss Nocturne bathes it in river (‘You must not bleed. Not yet.’) and Sharon realises Miss Nocturne has no reflection (‘She’s a vampire all right’), tries to escape pursued by dogs. [75] Sharon thinks she has found sanctuary at Fiona’s cottage whose owner tells her that school is a nest of vampires led by Miss N, who arrives and revealed that he works her as she killed his wife and has threatened his daughter. Ends with Miss Nocturne fangs about to bite Sharon. [76] Miss N distracted as Fiona poisons her dogs, they escape, find kids at school ‘in suspended animation, hypnotised and drugged!’ Sharon finds Yvonne and Miss N chases them but is crushed by portcullis (Sharon hides her face ‘Horrible. I only wanted to stop her following!’) and then daylight kills her. Schoolkids remember nothing and Sharon is sent back home.", "tags": ["Hypno*", "Drug*", "Nightmare*", "Wak*"], "tagged": true, "bg": "#A32D2D", "fg": "#FCEBEB"}, {"title": "Wolf Girl", "issues": [65, 66, 67, 68, 69, 70, 71, 72, 73, 74, 75, 76, 77, 78, 79, 80], "first": 65, "last": 80, "artist": "Eduardo Feito", "writer": "", "serial": "Serial", "summary": "[65] ‘Somewhere in eastern Europe’ a wolf cub dies as mother has to move it from hunters while too young, ‘British university lecturer and wife killed in wolf country’ when their car crashes in road and baby ‘protected by her shawl’ survives and is rescued by wolf. Wolf ages and child crawls away and is found by troops on military exercise and taken to home for orphans ‘It’s going to be no easy task, to tame the wolf-girl! Is there really any hope of a decent future for her?’ [66] Lona howls at moon when she feels alone and sad which worries her parents (‘I love my parents so much, but sometimes I feel I’m growing further apart from them each day’) then loses temper and attacks male school bullies with growls (‘scared of all these new feelings and emotions boiling up inside me’), goes home and overhears mum talking about her history and thinks her wolf instincts are taking over. [67] Parents reassure Lona (‘It’s just teenage blues. Most kids go through a time of feeling unsettled. It passes!’ and she tries to keep busy but catches herself gnawing chop bone at school lunch and panics. Jinny reassures her but on way home guard dogs at scrapyard bark at her (no sound just shown in posture) and she panics all over again. [68] Lona scares off dogs and almost turns on her friend Jinny, goes to zoo to test her theory and wolves flock to her ‘It’s undeniable, horrible proof that I’m more wolf than girl!’ [Lots of grid layouts in this episode]. [69] Lona howls with the wolves and later at home decides ‘they’re prisoners but at least I’m free’ then overhears her parents locking her in, next day at school declines invite to noisy party but relents when she’s teased for being a ‘lone wolf’, goes to the party but too loud and crowded and escapes outside to howl and dig in the earth. [70] Partygoers call cops as howling might be werewolves and they can’t find Lona, cops bring her back in. She decides to immerse herself in friends and to ‘forget all this wolf nonsense’ and she and Jinny join community service scheme to help out but when feeding hens she reverts to instinct and tries to kill one. [71] Lona runs away after attacking the chickens and remembers wolf lessons to swim across water to disguise her scent, panics in town [‘Courtier’ branding? K/Rosta?] hides in lift and then finds rack of fur coats and curls up in one until is discovered. [72] Lona is taken home by her friend, store detective and police, neighbours are talking, parents decide to take her to Aunt’s in Scotland for holiday, scenery makes her feel nostalgic for wolf childhood and she climbs out of train and runs – then worries if she will survive on her own. [73] Lona hides out in cave, gets back to wolf habits e.g. lapping water, but realises she can’t kill (rabbit), next day is misty and feels completely alone, howls and finds wolves in zoo and releases them (‘I hate human locks and bolts!’). [74] Lona releases wolves from zoo and they eventually follow her despite mistrust from leader (‘I –I don’t fit in with them…and I’m out of place at home with my parents. I’m just a misfit!’). They all hide in cave when a family sets up camp outside and Lona realises she must control wolves to prevent them from attacking (‘These have been imprisoned in that wildlife park. They hate humans and all that they stand for!’) [75] Police helicopter warns family away, Lona wins staring contest with Warrior and restates her responsibility to the pack, has memories of childhood and of forest fire, but next day he corners her on clifftop. [76] Lona defeats Warrior with fire but he calls the other wolves out to hunt when she is asleep, she goes after them and is shot by hunters. [77] Lona calls for help after being shot but no one comes ‘The wolves have deserted me. The humans have run off and I’m on my own.’ Goes to cottage and asks for help but lady is afraid and won’t let her in, pack is stalking and Warrior waiting for her to die so he can be leader ‘The wolves have gone – the humans are scared of me. I-I’m completely alone!’ and she faints [nice page layout parallel panels]. [78] Warrior and the pack save Lona, then they find a plane crash and a baby. [79] Lona takes in baby despite knowing it isn’t fair (‘I-I’m nothing but a misfit, not knowing where I belong. The baby might grow up feeling the same way.’), very happy for weeks, go rowing and boat starts to leak placing them in danger. [80] Lona and Anna are saved by Warrior but effort is too much and he dies, she tries to leave pack and get them to choose new leader but they follow her, so she decides to put the pack back in the zoo (‘They think I’ve betrayed them, bringing them back here! But it’s better to be a well cared-for prisoner than a hunted victim without a leader.’) and returns Anna to her relatives and herself to humankind (howls coming from zoo as she walks down high street clutching baby with people staring at her).", "tags": [], "tagged": false, "bg": "#085041", "fg": "#9FE1CB"}, {"title": "Friend In Need, A", "issues": [66], "first": 66, "last": 66, "artist": "Carlos Guirado", "writer": "", "serial": "Single", "summary": "Marla’s grandfather planted old elm tree near their house and various events show it looking out for her, ultimately it crashes to ground preventing lorry with failed brakes from hitting her ‘I know you did it for me, Elm… no matter what others may say… you were my friend to the last!’", "tags": [], "tagged": false, "bg": "#26215C", "fg": "#CECBF6"}, {"title": "One Bite Of The Apple", "issues": [66], "first": 66, "last": 66, "artist": "Josep Gual", "writer": "", "serial": "Single", "summary": "Twins Gloria and Gwendolyn are violent and mean to everyone in village (in past), gypsy tells them of old forest with giant fruit and apples that let you transform into any creature you wish, they ignore warnings and eat fruit after darkness and turn into apples and she picks them up to put in a pie (movie gremlins?)", "tags": [], "tagged": false, "bg": "#633806", "fg": "#FAC775"}, {"title": "One Hour In Time", "issues": [66], "first": 66, "last": 66, "artist": "John Richardson", "writer": "", "serial": "Single", "summary": "Horrible Laura is a model and treats everyone like dirt, pushes over an old woman selling beads who puts a curse on her (‘You stupid old hag […] let her grovel in the dirt where she belongs’), Laura thinks it has not worked but has forgotten that she didn’t need to set her watch back as on British Summertime – curse works and she ages, withers and dies in final panel.", "tags": [], "tagged": false, "bg": "#534AB7", "fg": "#EEEDFE"}, {"title": "Forever Winter", "issues": [67], "first": 67, "last": 67, "artist": "Ramon Escolano", "writer": "", "serial": "Single", "summary": "Stella wishes for it to continue snowing and it does – but only she can see it (panels showing her point of view, e.g. seeing her family as snowmen), people get tired of her ‘joke’ and her snow world becomes ‘dull and grey’ then she finds a dead bird and cries which melts the snow and ice ‘they belong in their proper place and I’ll never forget that – never again!’’", "tags": [], "tagged": false, "bg": "#0F6E56", "fg": "#E1F5EE"}, {"title": "Perfect Specimen", "issues": [67], "first": 67, "last": 67, "artist": "Isidre Monés", "writer": "", "serial": "Single", "summary": "Gail desperately wants a good fossil tries to steal one from museum, climbs tree and gets covered in sap like amber but this then revealed to be a dream, ultimately sneaks away and finds ammonite, but ends up trapped in ice – being viewed by futuristic creatures at end using same dialogue as her at start ‘To think that primitive creatures like this, teeming millions of them, were once masters of the earth!’", "tags": ["Dream*"], "tagged": true, "bg": "#993C1D", "fg": "#FAECE7"}, {"title": "Seal Rock", "issues": [67], "first": 67, "last": 67, "artist": "First-person story of daughter who discovers her mother was a seal tricked by her father (hidden her sealskin) and wants her to rejoin them – runs a ied because of this and has left the spirits disembodied and they continue to haunt her giving her more answers until head full to bursting (jagged panels, scary ghosts).", "tags": [], "tagged": false, "bg": "#5F5E5A", "fg": "#F1EFE8"}, {"title": "Welcome Home", "issues": [68], "first": 68, "last": 68, "artist": "Jorge Badia Romero", "writer": "", "serial": "Single", "summary": "‘From the beginning there was something wrong with Linda … something different about her!’, obsessed with fires and burns down warehouse, dog helps her escape and leads her into cave where she meets the devil who takes her into hell.", "tags": [], "tagged": false, "bg": "#A32D2D", "fg": "#FCEBEB"}, {"title": "Catch Me If You Can", "issues": [69], "first": 69, "last": 69, "artist": "José/Juan Ariza", "writer": "", "serial": "Single", "summary": "Jilly takes short cut and meets Vicky who teases her, gets home OK but cannot see her at school so goes back to wood, discovers Vicky is a ghost and ends with Vicky chasing her (‘Sobbing and stumbling, Jilly fled as if her life depended on it… as perhaps it did…’ (final panel of Vicky looming, Jilly crying).", "tags": [], "tagged": false, "bg": "#085041", "fg": "#9FE1CB"}, {"title": "Devil's Dummy, The", "issues": [69], "first": 69, "last": 69, "artist": "Blas Gallego", "writer": "", "serial": "Single", "summary": "Deirdre and Pam go to ventriloquist’s show and he makes a fool of Deirdre. Months later announces his retirement and buries dummy they go to dig it up and it shouts ‘THIEF!’ at them, they escape but Pam goes back and encounters ventriloquist who tells her dummy is possessed with soul of a vampire and story ends with possessed Deirdre calling for her boyfriend as he has bitten her.", "tags": [], "tagged": false, "bg": "#26215C", "fg": "#CECBF6"}, {"title": "Hag Of Hattersley Hall, The", "issues": [69], "first": 69, "last": 69, "artist": "Gives alternate story to legend where housekeeper rather than thieves kill and rob her master ‘Marie was pleased that she could leave those questions unanswered’.", "writer": "", "serial": "Single", "summary": "", "tags": [], "tagged": false, "bg": "#633806", "fg": "#FAC775"}, {"title": "Room Of Her Own, A", "issues": [69], "first": 69, "last": 69, "artist": "Josep Gual", "writer": "", "serial": "Single", "summary": "Lorna moves in with new family but has to share room with Joan which annoys her and she starts trying to scare her, which works so well Lorna runs off in fear one night and dies falling into swamp – and returns to haunt Joan ‘You’ll never be alone again!’", "tags": [], "tagged": false, "bg": "#534AB7", "fg": "#EEEDFE"}, {"title": "Loving Cup, The", "issues": [70, 71, 72, 73, 74, 75, 76, 77, 78, 79, 80, 81, 82], "first": 70, "last": 82, "artist": "Brian Delaney", "writer": "", "serial": "Serial", "summary": "[70] Italy, Lucy’s mother dies and gives her the cup, she is taken to England to be adopted by father’s relatives who have ‘The biggest hearts in Lamptown’, Lucy gets on well with them and cousin Trish and decides to seal their friendship by drinking from the cup together – Trish drinks and collapses for a nap, Lucy has a feeling she shouldn’t and starts to feel doubt about using the cup. [71] Lucy offers to help in shop, the family find Trisha unconscious but bring her round, uncle insists the cup go in his safe where Lucy sees shop’s takings, that night has odd dream of woman telling her to use the cup and when she comes round finds cash in her dress pocket from wardrobe. [72] Trisha realises the money is from her Dad’s safe but they put it back and she decides to forgive Lucy and try and understand why she might steal. Introduces her to her friends but Lucy is nervous (‘I… I don’t want to be left alone with them!’) and goes to get drinks has vision of ancestor and cup saying she has awakened her by getting Trisha to drink and can have riches [good merged splash page of crazy shaped panels] vows cup will never leave safe. [73] [Strange apparition breaks fourth wall to stare at us] Lucy goes to school with Trish and in needlework project puts on period Italian dress has another vision of herself poisoning a man and starts to laugh maniacally (‘Perish all those who seek to cross me…!’) [74] Lucy has nightmares about it poisoning people, uncle agrees to put cup in the bank, she goes horseriding and nearly falls but saved by relative from her dream who says she must finish her work. [75] Lucy succumbs to the cup’s power when placing it at the bank [possessed blank eyes filled with stars] and flurry of bank notes whirl around her. [76] Uncle helps Lucy let go of cup and she resolves to sell it to help him with money. Bad dreams that night and wakes up to see ‘BORGIA’ scrawled on mirror in blood red. [77] Lucy has lipstick all over hands and realises she must have written on mirror, man called Borgia wants to buy the cup, she has dream she is turned into a statue and put in place of her ancestor. [78] Lucy dreams she is stuck in place of statue then comes back to reality and Trisha prevents her from smashing cup. Take it to sell to the Borgias and explore garden where Lucy finds building like in her dream. [79] Lucy has a number of visions and follows call of ghostly ancestor, walks through a wooden door and ends up trapped in boarded-up old folly [good use of white/black contrast]. [80] Lucy is rescued and realises room she is in is all familiar (recognises statue etc). Mr and Mrs Borgia reveal to us that she has been promised to them, they keep the cup for testing and Lucy is briefly happy, then ends with them appearing as her aunt and uncle on mother’s side. [81] Lucy freaks out at the Borgias and they leave, she argues with Trisha (‘But don’t you think it’s all exciting and romantic?’ which both feel bad about, the Borgias perform a ceremony with the cup in their folly ‘As we call your name, we summon the girl who is your reincarnation. […] LUCREZIA BORGIA’. [82] Lucy walking in trance, comes to and is picked up by Borgias. Trisha thinks she has run away and goes after her, interrupts ceremony and smashes the cup which brings down the folly, killing the Borgias and finally freeing Lucy.", "tags": ["Possess*", "Trance*", "Dream*", "Vision*", "Nightmare*", "Wak*"], "tagged": true, "bg": "#0F6E56", "fg": "#E1F5EE"}, {"title": "Marble Jaws", "issues": [70], "first": 70, "last": 70, "artist": "José Canovas", "writer": "", "serial": "Single", "summary": "Trisha and Mary move into new house and explore mausoleum, Trisha gets locked inside and when Mary opens door she asks why she didn’t come sooner and who the old couple outside are. Mary explains ‘That happened forty years ago Trisha. I was knocked over by Daddy’s car when I ran to get help for you. […] But now we’re together again … for always!’", "tags": [], "tagged": false, "bg": "#993C1D", "fg": "#FAECE7"}, {"title": "Who Killed Teacher?", "issues": [70], "first": 70, "last": 70, "artist": "José/Juan Ariza", "writer": "", "serial": "Single", "summary": "Mandy complains for always being kept behind in school and starts trying to scare her teacher as revenge. Teacher runs in front of car and is hit, Mandy tells friend Grace what she has done and Grace reveals Mrs Prendergast was a witch and had been teaching her – she swaps their bodies ‘at the exact moment of death’ saving Mrs Prendergast and killing Mandy.", "tags": [], "tagged": false, "bg": "#854F0B", "fg": "#FAEEDA"}, {"title": "Wolfsbane", "issues": [70], "first": 70, "last": 70, "artist": "Jorge Badia Romero", "writer": "", "serial": "Single", "summary": "Sara on holiday is bored and goes to disco with Paul, travelling across moors despite ‘Just daft tales – about vampires and werewolves, stuff like that. None of us young ones believe that rubbish – all we want to do is have a good time!’ On way home they stop to pick wolfsbane flowers which he tells her show it is time for werewolves to come out and she sees his hairy hand and face and runs off on his bike back to town, ], "first": 78, "last": 78, "artist": "John Armstrong", "writer": "", "serial": "Single", "summary": "Katey is teased and bullied because her dad is gravedigger, she hides and catches pneumonia and dies, main bully is forced to go and put flowers on grave but is not sorry, hand comes out and holds her there she is found dead of fright in morning (Carrie similarity?).", "tags": [], "tagged": false, "bg": "#72243E", "fg": "#FBEAF0"}, {"title": "Missing Piece, The", "issues": [78], "first": 78, "last": 78, "artist": "Jorge Badia Romero", "writer": "", "serial": "Single", "summary": "Freda is jealous of the attention her cousin Joan (invalid) gets, her father gives her jigsaw made of a ‘special’ sandalwood ‘I picked up in India’ so she steals a piece and throws it out of window, Joan falls down stairs (dead?) and uncle runs over piece in car, damaging? Removing? her face (unshown) – bad end for everyone!!", "tags": [], "tagged": false, "bg": "#5F5E5A", "fg": "#F1EFE8"}, {"title": "Sweet Tooth", "issues": [78], "first": 78, "last": 78, "artist": "José Canovas", "writer": "", "serial": "Single", "summary": "Caroline loves sweets and skips dental apt, then gets very bad toothache and taken to creepy dentist who gives her ‘teeth that will last for evermore’ and bites her ‘now she had a far more sinister taste to satisfy’ and pic of her showing fangs (again seems quite undeserved!!)", "tags": [], "tagged": false, "bg": "#A32D2D", "fg": "#FCEBEB"}, {"title": "Winner Loses All!", "issues": [78, 79, 80, 81, 82, 83, 84, 85, 86, 87, 88, 89, 90, 91, 92, 93, 94], "first": 78, "last": 94, "artist": "Mario Capaldi", "writer": "", "serial": "Serial", "summary": "[78] Sandy helps out her drunk Dad at stables so he won’t lose his job, hides out in ruins of old inn to escape pity, Mr Dayville offers her a deal – her father restored, a beautiful home, the Worthing cup – in exchange for her soul (he smokes cigar). [79] Sarah realises Dayville is the Devil [splash page of demons before he returns to entrepreneur ‘Puts people off. Not good for business.’], he gives her a free trial and when she gets home her dad is sober and they are given horse Satan (inn sign now blank) and a new house to stay in. She has a dream that night (cover image nightmare) and when she wakes up the horse is back on the inn sign and her dad is drunk again. [80] Sandy makes the deal to save her Dad after Jocasta says she will tell Mrs Hornby he is drunk again (in a ditch) [good page layout], final panel lots of demons. [81] Sandy signs contract in hell (good de luca/Lyta alterities style panel ‘You’re mine… mine… mine…’) and rides Satan into woods, gets chased by hounds on a hunt. [82] Sandy and Satan try to outrun the hounds but fall at a fence, hunters save them, Sandy realises Satan is ‘unnatural’ and notices he is not sweating or bleeding. Jocasta gets her dad to buy stables on condition he fires Sandy’s dad [Good page layout when she falls]. [83] Dayville appears to Sandy at night with a demon and then vanishes (invisibility panel) after saying he will thwart deal to buy stables (as already owns Jocasta’s father) and all goes well. Sandy realises she has less than a year as he expects her to win the 1980 Olympics. [84] Sandy argues with Dayville for only giving her a year, and helps her Dad unpack stuff and realises inn sign is missing, then Satan falls as someone in road runs over it (has fallen off truck) and breaks both his front legs – certain he will have to be put down. [85] Sandy runs to get vet and then finds inn sign broken in road, wonders if it is linked, holds it together and Satan stands up, Jocasta sent to find Sandy and discovers her gluing the inn sign and wants to know what is going on. [86] Jocasta does not discover her secret, Sandy makes a worse deal with Dayville that when Satan’s secret is discovered her soul will be his immediately, not realising her dad and the vet secretly sneak him out for x-rays that night after she falls asleep. [87] Sandy interrupts dad and vet and her dad is annoyed as thinks she cares more about winning than his reputation, they proceed to the race but Mr Dayville and demons turn up and scare all the horses [red background for Dayville scenes]. [88] Sandy wins the race unfairly as Jocasta’s horse is deliberately spooked by Dayville’s demons, realises it will all be like this ‘I’ve won the Worthing Cup, but I’ve lost all pride, all dignity, all hope…’ [89] Sandy wins race and invited to participate in international event, Jocasta tells vet what she saw, Sandy goes riding again but Satan’s legs break and she goes home to discover vet has taken inn sign. [90] Sandy goes to get sign from vet at stables but Jocasta says he has gone looking for her on a horse, she smashes vet’s car window, is chased by Dayville’s demons who take the sign, vet finds Satan. [91] Vet tries to drug Satan, doesn’t work and he gallops off, Dayville returns inn sign to Sandy as his demons should not have interfered, she hides it and resolves to practice hard, vet suspects her and decides to have his friend at race inspect Satan. [92] Sandy goes to race and Dayville pulls same tricks, vet arranges test and ends with her Dad ‘Sandy what have you done?’ [93] Sandy’s dad overheard her deal and thinks it is for ambition, goes to get a drink and then realises it was all for him. Jockey urges Sandy that she might win since all the other horses are getting spooked by demons. Vet’s friend does dope test and Sandy panics but Satan provides blood etc, she wonders ‘Have you suddenly become real?’ [94] Satan is a real horse, because Sandy’s father made a deal in her place for his soul, and collapses and dies. Sandy is on her own without Dayville’s help but makes a clear round and goes on to win. Renames horse Phoenix and promises ‘Dad gave us both a new life – we must never forget that. We must make him really proud of us. We must win that Olympic Gold!’", "tags": ["Drug*", "Dream*", "Nightmare*", "Wak*"], "tagged": true, "bg": "#085041", "fg": "#9FE1CB"}, {"title": "Dead Man's Eyes", "issues": [79], "first": 79, "last": 79, "artist": "John Armstrong", "writer": "", "serial": "Single", "summary": "Glenda at posh school for girls on archeological dig, bored, finds skull of prophet El Urah with power to see future in his eyes, she sees future of her friend Cheryl’s accident in it but doesn’t warn her to see if it is true, then uses it more despite warnings and steals it, inherits curse as part of prophecy and future is now seen in her eyes.", "tags": [], "tagged": false, "bg": "#26215C", "fg": "#CECBF6"}, {"title": "Governess, The", "issues": [79], "first": 79, "last": 79, "artist": "Jesus Redondo", "writer": "", "serial": "Single", "summary": "Mary Connaught employed as governess for little Audrey who seems perfect, but she finds her looking out of window at figure of woman in forest during night and next day Audrey tricks her and locks her in cellar with another previous governess who explains she wants her old governess back who died 6 months ago – final panel demonic Audrey and ghostly/zombie governess ‘You can come back now Miss Phelps – I’ll have no other governess but you – ever!’", "tags": [], "tagged": false, "bg": "#633806", "fg": "#FAC775"}, {"title": "Peasant Girl's Revenge!, A", "issues": [79], "first": 79, "last": 79, "artist": "Marie Lebrun, peasant at time of Joan of Arc, killed in black arts sacrifice and haunted her killer until he died.", "writer": "", "serial": "Single", "summary": "", "tags": [], "tagged": false, "bg": "#534AB7", "fg": "#EEEDFE"}, {"title": "Spitting Image", "issues": [79], "first": 79, "last": 79, "artist": "Jorge Badia Romero", "writer": "", "serial": "Single", "summary": "Princess Rebecca is vain and jealous of her servant who is growing more beautiful after an artist paints her portrait, she imprisons him and he draws a ugly portrait of her (‘I can paint only what I see’) for which he is tortured, but Sarah rescues him and they escape and Rebecca ends up looking like her hideous portrait (‘I could see only cruelty and ugliness – and, in truth, that is what I had to portray!’)", "tags": [], "tagged": false, "bg": "#0F6E56", "fg": "#E1F5EE"}, {"title": "Darkness At Noon", "issues": [80], "first": 80, "last": 80, "artist": "Jorge Badia Romero", "writer": "", "serial": "Single", "summary": "Italian city in past, Julia has horrible nightmares of herself in the future and city being engulfed but nobody believes her, she is drugged and sent to bed and it is revealed in narration that this is Pompeii and Vesuvius is erupting, final panel of tourists ‘Poor girl, she must have died an awful death…! I wonder who she was…?’", "tags": ["Drug*", "Nightmare*"], "tagged": true, "bg": "#993C1D", "fg": "#FAECE7"}, {"title": "Monkey, The", "issues": [80], "first": 80, "last": 80, "artist": "Mario Capaldi", "writer": "", "serial": "Single", "summary": "Kitty teases organ grinder’s monkey and it bites her, she starts acting more monkeylike, and then music calls her to his house, where she changes place with monkey and realises she will have to dance like this ‘till the end of my days…’", "tags": [], "tagged": false, "bg": "#854F0B", "fg": "#FAEEDA"}, {"title": "Time To Spare", "issues": [80], "first": 80, "last": 80, "artist": "John Richardson", "writer": "", "serial": "Single", "summary": "Margo never has time to help her mum, or to help old guy across the road when she wants to meet friends at the beach, he decides to teach her a lesson and traps her in glass bottle ‘Scream all you want, my pretty. There is no-one to hear you. Now you have time, nothing but time, until I choose to release you … / And who can say when I will have enough time to spare for that…?’", "tags": [], "tagged": false, "bg": "#185FA5", "fg": "#E6F1FB"}, {"title": "Ghost Of Golightly Towers, The", "issues": [81, 82, 83, 84, 85, 86, 87, 88, 89, 90, 91, 92, 93, 94], "first": 81, "last": 94, "artist": "Jaime Rumeu ('Homero')", "writer": "", "serial": "Serial", "summary": "[81] Amanda is taken away from her mother who has refused court order to send her to school (wants to home school) and taken to children’s home, hard kids there initiate her by locking her in haunted cellar where she meets ghost of Sir Giles (‘The official spectre in residence of Golightly Towers) who screams because he is scared of her shadow and turns out to be ‘rather nice for a ghost!’ He then starts to cry and she asks him to tell her his story. [82] Sir Giles tells his story has been trying to scare people at the Home but no success (‘You know what they said it was last time? The cistern! I ask you!’) – compulsive gambler and lost all money, challenged to a duel by Sir Humbert… Marlene and friends get a sheet and dress as a ghost to scare Amanda but only Sir Giles is scared and runs away into wall (Amanda - ‘Oh, really… you’re impossible!’) [83] Amanda tells Marlene and others about ghost but they don’t believe her. She skips lessons and goes to find Sir Giles who tells the rest of his story – he fled duel when he was unseated, and Humbert then hunted him down and killed him, and so he was dishonoured as a and disowned by his family and cursed to haunt the hall until he has scared someone into fleeing just as he did. Amanda promises to help him. [good slanted panels] [84] Amanda and Sir Giles put red ink (ghostly blood) on carpet, Marlene and gang jump her as they think she has been sucking up to Head who interrupts, and Amanda discovers that Marlene is a Quincy descendent (foe of Sir Giles). [85] Amanda helps Sir Giles and gets him to go and scare Marlene but she has set a trap – bucket of water balanced on door [good panel of Amanda agreeing to help, abstract surround and circular]. [86] Sir Giles sulks as ‘I was phosphorescent at full power - I might have shortcircuited!’ [visual pun ‘no need to get on your high horse] she goads him into carrying on and he turns gym horse into a real one, but disturbed by head who says she is going to send Amanda away. [87] Marlene sets Amanda up smashing windows and she is taken away by psychiatrist (‘See a ghost today and people think you’re mad. All they believe in is machines.’) but Sir Giles appears to rescue this damsel in distress. [88] Sir Giles causes car to swerve and crash and psychiatrist is unconscious, Amanda goes with him to games pavilion cottage, he tells her about his true love Ermyngarde who was forced to marry Quincy after his disgrace and poisoned him/killed herself, only to find Sir Giles was not waiting for her in afterlife as trapped on earth. [89] Marlene and her spotty minions’ set up a vigilante squad, Amanda’s mother arrives to hunt for her daughter, Amanda and Sir Giles outwit them and Amanda flees the grounds (Sir Giles must stay). [90] Giles encourages Amanda to go (from ‘the maleficent Marlene’) but she stays, Marlene and gang scare Sir Giles and he vanishes (nice sequential disappear), she tells her mum she wants to stay and head catches Marlene’s gang, they vow revenge but Sir Giles says he has thought of a scheme to scare her away. [91] Sir Giles tries poltergeist activity on Marlene but they just think it is each other, Amanda tells him off and he tells her more about his past hunting, but interrupted by Marlene wanting a fight. [92] Marlene and others arrive to beat up Amanda but scared off by face at window, Sir Giles says it wasn’t him and then they meet ghost of De Quincy who says he has a deal for Sir Giles. [93] Quincy offers a deal that if they duel Sir Giles can go free, Amanda tries to stop him [poor panel arrangement on this page] but knocks over suit of armour, doctor appears as he is leaving and wants to take her as before then sees the two ghosts fighting. [94] Sir Giles and de Quincey battle, and Sir Giles starts a fire but then de Quincey kills him (cheats). School is being evacuated and Lady Ermyngarde appears as he has scared away whole school and he goes off to heaven with her. Amanda goes home with mother and de Quincey left there. [Dramatic duel page using space of page and ending on villain not triumph]", "tags": [], "tagged": false, "bg": "#3B6D11", "fg": "#EAF3DE"}, {"title": "Inside Story", "issues": [81], "first": 81, "last": 81, "artist": "John Richardson", "writer": "", "serial": "Single", "summary": "Rewriting of Pandora (revealed at the end) she hears voices telling her to ‘help ussss’ (black background panels showing spirits) that trick her into opening the box ‘Mythology tells us that when Pandora released the sickness and plague and evil and greed into the world, it was her curiosity that was to blame… but now you know – the inside story!’", "tags": [], "tagged": false, "bg": "#72243E", "fg": "#FBEAF0"}, {"title": "Lighthouse Keeper's Daughter, The", "issues": [81], "first": 81, "last": 81, "artist": "Blas Gallego", "writer": "", "serial": "Single", "summary": "Criminals go to hide their loot in deserted lighthouse but encounter its keeper Andy who they shoot dead (fourth wall shot of gun firing at us), his daughter then enacts revenge on them and turns out she is a mermaid in final panel (EC style narration: ‘No, Wigg – you won’t manage it! You’ll never manage anything again…’)", "tags": [], "tagged": false, "bg": "#5F5E5A", "fg": "#F1EFE8"}, {"title": "Sprig Of Heather", "issues": [81], "first": 81, "last": 81, "artist": "Blas Gallego", "writer": "", "serial": "Single", "summary": "Polly sells lucky heather but mean stepdad takes all her money (‘I was a poor widow with a young family, Polly. I thought I needed a man’s protection’ feminist slant as stepdad is useless violent drunk) she picks more and meets fairies (‘Manikin’) who agree to help but she wakes up and thinks it was all a dream, only to find he has been press ganged while in the tavern.", "tags": ["Dream*", "Wak*"], "tagged": true, "bg": "#A32D2D", "fg": "#FCEBEB"}, {"title": "Girl Who Hated Spiders, The", "issues": [82], "first": 82, "last": 82, "artist": "Sue hates spiders and classmate Roger is tormenting one when he transforms it with a made-up chemistry set into Arachne (beautiful ‘full red lips’, vampire teeth ‘fangs, sharp and pointed as a she-wolf’s’, long red nails ‘red like pointed talons’) who tries to eat him – Sue turns her back into a spider with chemical.", "writer": "", "serial": "Single", "summary": "", "tags": [], "tagged": false, "bg": "#085041", "fg": "#9FE1CB"}, {"title": "Hands Of Nefri", "issues": [82], "first": 82, "last": 82, "artist": "Ramon Escolano", "writer": "", "serial": "Single", "summary": "Jodi is given mummified hands covered in gold (though ‘taken’ used in first panel) by dying grandfather and promises to return them to Egypt but ‘I’m just nutty about having a good time – and I don’t give a hang who knows it!’ she refuses ‘Just an old mummy – she can’t hurt me!’ she dreams she is powerful and rejects her aunt/uncle then they all fade away and she is alone, when she wakes the hands have been shattered and she hears a mummy advancing (we see legs) and final panel reveal the skeletal hands are hers.", "tags": ["Dream*", "Wak*"], "tagged": true, "bg": "#26215C", "fg": "#CECBF6"}, {"title": "Old Collie's Collection", "issues": [82], "first": 82, "last": 82, "artist": "Mario Capaldi", "writer": "", "serial": "Single", "summary": "Shirley’s friends dare her to find out what is in Old Collie’s antiques shop she peers through windows and sees amazing snowglobes, goes back later to steal one and sell it, opens locked door within and finds herself trapped in a globe which he puts on shelf with others ‘My collection is growing nicely. How small it would be if there were less greedy people in the world…!’", "tags": [], "tagged": false, "bg": "#633806", "fg": "#FAC775"}, {"title": "Present From Singapore", "issues": [82], "first": 82, "last": 82, "artist": "José/Juan Ariza", "writer": "", "serial": "Single", "summary": "June receives a weird screaming doll from her penpal in the post, hates it and locks it away but goes off (explained by cat) dad agrees to get rid of it but then it screams again and alerts them to him in danger while fixing car, he reveals he took its electrics out so shouldn’t have been able to scream, June says ‘I don’t know, mum… but it’ll always be my favourite doll from now on!’", "tags": [], "tagged": false, "bg": "#534AB7", "fg": "#EEEDFE"}, {"title": "Black Gauntlet, The", "issues": [83], "first": 83, "last": 83, "artist": "Josep Gual", "writer": "", "serial": "Single", "summary": "Village of Dunraven and Elaina is chosen to be the sacrifice for dragon, but knight comes and saves her by killing it ‘she felt strangely drawn to him, sharing a bond that was akin to love’ and gives him a flower but he refuses to enter the village. When she tells her mother she replies that her father was given a black gauntlet in dishonour when he married her and Elaina finds the flower she gave the knight inside it. Ends on questions ‘Who knows what truly happened out there at dragonrock? […] But Elaina believed it. For when she opened the fingers of the gauntlet she found ‘The flower… the flower I gave him!’’", "tags": [], "tagged": false, "bg": "#0F6E56", "fg": "#E1F5EE"}, {"title": "Cathy And The Nature Spirits", "issues": [83], "first": 83, "last": 83, "artist": "José/Juan Ariza", "writer": "", "serial": "Single", "summary": "Cathy’s dad sells land down by the stream she warns the nature spirits there but it goes ahead, when the first tree is cut she appears there injured, after he calls it off she returns to her bed and is OK.", "tags": [], "tagged": false, "bg": "#993C1D", "fg": "#FAECE7"}, {"title": "Haunted Barn, The", "issues": [83], "first": 83, "last": 83, "artist": "In 1802 poor milkmaid Alison works herself to death to get food and then haunts the barn in which she was made to thresh corn by mean farmer’s wife.", "writer": "", "serial": "Single", "summary": "", "tags": [], "tagged": false, "bg": "#854F0B", "fg": "#FAEEDA"}, {"title": "Silver Racer-Back, The", "issues": [83, 84, 85, 86, 87, 88, 89, 90, 91], "first": 83, "last": 91, "artist": "John Armstrong", "writer": "", "serial": "Serial", "summary": "[83] Swimmer Kerry is poor but beats arrogant rich Ros by envisaging herself as a dolphin (as suggested by her father) and offered a place in the squad for free, second time she does this also sees herself watching in a silver racer-back costume and wins again, then when she gets home receives a parcel in the post. [84] Kerry’s parcel contains a silver swimsuit as in her dream. She wears it and has visions of demons chasing her - breaks county record by over a second. Tells her Dad who thinks it is all psychological, wears it again and feels normal but then urge to scream overtakes her. [85] Kerry racing, has out of body experience as before but includes lab men [divided splash page with angular layout], swims fast again which annoys other girls, takes off costume and overhears Mr Winter (trainer) on phone referring to her as a ‘Guinea pig’ and he tells her to wear it for all sessions from now on. [86] Kerry tricks Mr Winter by wearing two costumes, finds out her brother Tony is coming home Friday and resolves to ask him, gets in trouble at school for being too tired/sleeping as tiring herself out trying to keep up with expectations, comes home to find cops at door talking to her mum. [87] Kerry’s house is burgled but she has costume in her bag, scientists set it to self-destruct but she wakes up and pours water on it, gives it to brother Tony to do tests on, goes to club and Ros has a new silver racer-back swimsuit. [88] Ros beats Kerry in racer-back seeing sharks chasing her, but denies it to Kerry; Kerry still able to use her psychic powers; tricks Mr Winter by turning up in fake silver swimsuit, she and Tony follow him in car after class. [89] Kerry and Tony follow Mr Winter to Rotex Labs, he realises by cannot do anything. Kerry uses her psychic powers to help calm Ros and tries to tell her mum to ease off, then decides to steal the racer-back but Ros sees her in mirror. [90] Kerry caught stealing costume and Mr Winter kicks her off team and makes sure everyone knows, lab men kidnap her and try to take her psychic powers. [91] Kerry used in lab demonstration, considered expendable but saved by Tony who learnt ‘a lot’ from analysis of costume, story ends with new club coach and she and Ros winning dead heat.", "tags": ["Dream*", "Vision*", "Wak*"], "tagged": true, "bg": "#185FA5", "fg": "#E6F1FB"}, {"title": "Tadpole Terror, The", "issues": [83], "first": 83, "last": 83, "artist": "Julio Bosch with inking done by José María Bellalta", "writer": "", "serial": "Single", "summary": "Jinny and big sister Cora are going on holiday when Jinny realises she has left jar of tadpoles on windowsill, Cora refuses to go back and when arrives on holiday while swimming is attacked by giant frogs and then saved by a diver who turns out to be a frog in a wetsuit – all a dream and she stops the coach and goes back for the animals ‘We’ll be late starting our holiday – but I realised they have just as much right to live as we do…!’ [NB frogman colloquial for diver but not used here = visual pun?]", "tags": ["Dream*"], "tagged": true, "bg": "#3B6D11", "fg": "#EAF3DE"}, {"title": "Danger In The Depths", "issues": [84, 85], "first": 84, "last": 85, "artist": "Josep Gual", "writer": "", "serial": "Serial", "summary": "[84] Plane explosion drops box of radioactive isotopes into lake and fish grow big – Joanna and family go on holiday and she sees boy pulled underwater (call police, find nothing) then they go out in boat and are chased by giant fish, call police again showing damage to boat. [85] Floods cause lake to breach and fish attacks them in house but family escapes in boat, 3 weeks later floods subside and police find giant body of fish, they dynamite the lake and radioactive box sinks deep into mud – but can it infect the worms? [final panel shot of monstrous worm in background!]", "tags": [], "tagged": false, "bg": "#72243E", "fg": "#FBEAF0"}, {"title": "Nightmare", "issues": [84], "first": 84, "last": 84, "artist": "Maria Barrera Gesali", "writer": "", "serial": "Single", "summary": "Adopted Ellie has nightmares every night caused by her big sister Joan who tells her ghost stories, Ellie tells her gran (witch) who assures her it is all false and she will fix Joan, next nightmare Joan goes in to scare Ellie more and is picked up by ‘a creature from a nightmare’ giant horse that carries her off and Ellie is left with the new parents ‘If we’ve really lost Joan then all we’ll have is little Ellie. We must give her the very best we can.’ And Ellie and her gran ‘watched the true and authentic night mare galloping endlessly across the sky.’", "tags": ["Nightmare*"], "tagged": true, "bg": "#5F5E5A", "fg": "#F1EFE8"}, {"title": "Nobody's Child", "issues": [84], "first": 84, "last": 84, "artist": "Carlos Guirado", "writer": "", "serial": "Single", "summary": "Carrie is an orphan and pickpocket on historical London streets (‘All right, so it’s wrong to cheat and steal, but wot other chance did I ‘ave? Wot other way can I live?’) and mongrel dog starts following her and preventing her thefts, takes her to a pauper’s graveyard and Annie Dawkins’ grave, where an old lady tells her about her death due to thieving and that this is her dog, Carrie decides to go straight and final panel selling violets and making money.", "tags": [], "tagged": false, "bg": "#A32D2D", "fg": "#FCEBEB"}, {"title": "Monster Of Green Acres", "issues": [85], "first": 85, "last": 85, "artist": "Jacques Goudon", "writer": "", "serial": "Single", "summary": "(2nd person narration addressed to madman stalking the town) – people become increasingly scared and town ends up deserted, revealed it is the scarecrow who ‘just didn’t know when to stop’.", "tags": [], "tagged": false, "bg": "#085041", "fg": "#9FE1CB"}, {"title": "What Did You Say?", "issues": [85], "first": 85, "last": 85, "artist": "P. Montero", "writer": "", "serial": "Single", "summary": "Selfish Sandra plays her radio too loud all the time, they move to country and she is told off for playing music loudly in graveyard, goes to sleep and has dream about ‘waking the dead’ banging on her windows (framed as dream in both wavy panel shape and captions ‘And as she slept…’), then wakes up and then realises they are still there – but revealed it is pensioner coach asking for directions (Sandra remains unaware and afraid).", "tags": ["Dream*", "Wak*"], "tagged": true, "bg": "#26215C", "fg": "#CECBF6"}, {"title": "You Never Know Who", "issues": [85], "first": 85, "last": 85, "artist": "Anita Davies", "writer": "", "serial": "Single", "summary": "True ghost story of Nun’s Bridge – lorry driver picks up her ghost (drowned by brother for sake of family honour).", "tags": [], "tagged": false, "bg": "#633806", "fg": "#FAC775"}, {"title": "Brave Maid Of Norfolk, The", "issues": [86], "first": 86, "last": 86, "artist": "Farmer makes a bet his servant Mary-Anne is brave enough to get a skull from charnel house, sexton hides there and pretends to be ghost but when they go back for him he is dead ‘Had he died of fright at finding himself locked in? Or had his antics aroused and offended some sinister presence in that evil place? We shall never know.’", "writer": "", "serial": "Single", "summary": "", "tags": [], "tagged": false, "bg": "#534AB7", "fg": "#EEEDFE"}, {"title": "Hangman's Alley", "issues": [86, 87, 88, 89, 90], "first": 86, "last": 90, "artist": "Jesus Redondo", "writer": "", "serial": "Serial", "summary": "[86] Mel and Jacey and family move to house above old hangman’s alley which is haunted, Jacey looks out of window and sees ghost with Mel’s face (‘That awful thing with Mel’s face … and I felt the hate coming from it’), wakes next night to find ghost bending over Mel but scares it away as Mel wakes up ‘You must have been dreaming’. [87] Jacey and Mel go to disco, get separated on walk home and Jacey finds her possessed and standing on bridge, investigates alley and spirit tells her story – remembers being sent to gallows protesting her innocence, mum finds Jacey in alley. [88] Jacey skips school to investigate old gaol and agrees she will help ghost, but is picked up by cops, parents unimpressed. She suggests housewarming party but during preparations for this sees ghost and Mel has disappeared – heads out and finds her collapsed in the alley. [89] Mel is OK it’s just a warning (cherryade not blood and writing on wall), Jacey sent to doctors and sees photo in mag of Melinda’s name scratched on wall of old house, when she returns makes ghost tell her whole story, accused of stealing mistress’s pearls and hung. Doctor says she is fine but Mel says she looks terrible. [90] Jacey goes to old house and Mel follows her, they share a joke and laugh and house is set afire (by ghost) while smashing wall to get out Jacey finds box with pearls and confession from girl who stole them – saw Melinda hung, caught smallpox and left in house to die. Reporter uses confession to save house from development and it is turned into a museum and Jacey presented with the pearls as a reward.", "tags": ["Possess*", "Dream*", "Wak*"], "tagged": true, "bg": "#0F6E56", "fg": "#E1F5EE"}, {"title": "Jorum Is Coming", "issues": [86], "first": 86, "last": 86, "artist": "José/Juan Ariza", "writer": "", "serial": "Single", "summary": "Heather finds an space-egg and plants it in wood while in a trance, becomes increasingly detached and sure that ‘Jorum is coming’, egg tells her to kill her parents, she gets axe but then hears them say they love her and smashes egg instead.", "tags": [], "tagged": false, "bg": "#993C1D", "fg": "#FAECE7"}, {"title": "Mrs Grundy's Guest House", "issues": [86], "first": 86, "last": 86, "artist": "John Richardson", "writer": "", "serial": "Single", "summary": "Pickpocket Jilly spends day stealing from OAPs and then tries to find a B&B for evening with no luck, breaks into Mrs Grundy’s (always empty though Mrs G says it is full) and then says she wants to stay when discovered, while trying to steal ornaments ghosts appear and say she must be punished, they hold her and her struggles knock curtain into fire and burn down house with her in it ‘burned alive’ ‘You’re a wicked gill, Jilly Sloper. You came here to rob me. And now you’ve burned down the only refuge these poor lost souls have ever had. I don’t think anything would make them let you go now.’ ‘In the ruins of the old house one remained .. doomed to stay there forever!’", "tags": [], "tagged": false, "bg": "#854F0B", "fg": "#FAEEDA"}, {"title": "I Must Catch The Last Train", "issues": [87], "first": 87, "last": 87, "artist": "1st person narrator moves into old railway station and meets girl trying to catch the last train to be with her love, helps her and then reads about accident 100 years ago ‘What had I done on that cold, misty night? Had I helped to send the young girl to her death, or had I helped a lost soul to find peace? I’d never know for certain, but somehow I feel I was right to re-unite Lottie and her Albert.’", "writer": "", "serial": "Single", "summary": "", "tags": [], "tagged": false, "bg": "#185FA5", "fg": "#E6F1FB"}, {"title": "Monster Movie", "issues": [87], "first": 87, "last": 87, "artist": "Isidre Monés", "writer": "", "serial": "Single", "summary": "Kaye and little sister Gemma are watching a monster movie on TV Kaye is bored and Gemma is scared so turn it off and go to look at the old house in town which looks identical, while there Kaye scares Gemma and she decides go home, Kaye finds old movie reels showing monster attacking some guy ‘This wasn’t in the film we saw on TV … not really surprising though… / No-one could possibly believe such an improbable monster lived in this house…!’ as panels show monster about to grab her.", "tags": [], "tagged": false, "bg": "#3B6D11", "fg": "#EAF3DE"}, {"title": "Witchfinder", "issues": [87], "first": 87, "last": 87, "artist": "Josep Gual", "writer": "", "serial": "Single", "summary": "In historical Spain witchfinder statue was erected in gratitude, but a year before true events show that the statue is the witchfinder himself turned to stone and his men turned to trees by young girl whose family were witches – poetic justice ‘a heart of stone, Iserte … so be it. Let the rest of your body match your heart!’ ‘And you who would use wood to destroy life shall in turn become wood!’", "tags": [], "tagged": false, "bg": "#72243E", "fg": "#FBEAF0"}, {"title": "Collector, The", "issues": [88], "first": 88, "last": 88, "artist": "Carlos Guirado", "writer": "", "serial": "Single", "summary": "Karen wants a holiday to Majorca, meets Mad Mary who gives her crystal ball to wish on so she can dream it, Karen refuses to return it and lies, and is forced to relive the same dream, then vanishes into crystal ball which Mary’s monkey steals and it shrinks to marble size to join her collection (piles on the horror in content and visuals!) (‘So many dreams… so many nightmares… ha, ha, ha!’).", "tags": ["Dream*", "Nightmare*"], "tagged": true, "bg": "#5F5E5A", "fg": "#F1EFE8"}, {"title": "Mermaid", "issues": [88], "first": 88, "last": 88, "artist": "Rafael Busom", "writer": "", "serial": "Single", "summary": "Sheila meets a mermaid who proves to be evil and wants to capture her soul so she can venture on land (‘A mermaid who dares leave the water loses her powers and becomes a fish all over – and the only way she can venture on land is by first capturing a human soul’) tries to avoid her but nonetheless snared by her music, but it stops when she is caught by a fisherman’s net and turns into fish (‘I should be happy now I am free from her spell – yet she was so beautiful, I feel sorrow, too’).", "tags": [], "tagged": false, "bg": "#A32D2D", "fg": "#FCEBEB"}, {"title": "Art Of Death", "issues": [89], "first": 89, "last": 89, "artist": "Julio Bosch with inking done by José María Bellalta", "writer": "", "serial": "Single", "summary": "Children are dying in Kings Lynn village, drained of energy, Ingrid wonders if disease brought by art teacher then discovers it is his spell – tells father and police smash models and buried children have had their energies restored 'He's some kind of fiend, an energy vampire'.", "tags": [], "tagged": false, "bg": "#085041", "fg": "#9FE1CB"}, {"title": "Forest Of Fear?, The", "issues": [89], "first": 89, "last": 89, "artist": "Jorge Badia Romero", "writer": "", "serial": "Single", "summary": "Heidi Klimt loves Smirch Forest despite bats etc and werewolves/vampires rumours (‘If only I could explain properly why I’ll never be scared of the forest, or let stories of werewolves and vampires make me fearful!’), encounters stranger on way to grandmother’s house, he beats her there and turns out to be werewolf, she orders him off and is revealed as vampire in final panel (visual only – ‘the thing Heidi had become’), crying ‘I hoped you’d never need to know my secret, Grandmother…!’", "tags": [], "tagged": false, "bg": "#26215C", "fg": "#CECBF6"}, {"title": "Cave Of Horror..., The", "issues": [90], "first": 90, "last": 90, "artist": "Pat gets trapped by tide in cave, finds ledge to hide on, legend of pirate haunting it and she sees figure covered in sand – which was how they buried him.", "writer": "", "serial": "Single", "summary": "", "tags": [], "tagged": false, "bg": "#633806", "fg": "#FAC775"}, {"title": "Madhouse!", "issues": [90], "first": 90, "last": 90, "artist": "Jorge Badia Romero", "writer": "", "serial": "Single", "summary": "Sally Bishop and four strangers wake up in house, strangers start to disappear one by one, she escapes but pullback to reveal giant apes playing a board game.", "tags": [], "tagged": false, "bg": "#534AB7", "fg": "#EEEDFE"}, {"title": "Take The Money!", "issues": [90], "first": 90, "last": 90, "artist": "José Canovas", "writer": "", "serial": "Single", "summary": "Mary and Anna are offered deal to press a button on a box in exchange for a million pounds, told this will kill an old Chinese lady who is in great pain. Mary rejects this (‘that’s monstrous!’) but Anna accepts and that night her room is filled with banknotes – but then discovers she is trapped in the box as another person has taken same deal (‘You will get your money tomorrow morning – that’s usually how long it takes!’)", "tags": [], "tagged": false, "bg": "#0F6E56", "fg": "#E1F5EE"}, {"title": "Food For Thought", "issues": [91], "first": 91, "last": 91, "artist": "Ramon Escolano", "writer": "", "serial": "Single", "summary": "Jill and Betty at end of idyllic holiday and looking forward to BBQ but then netted by aliens and taken across galaxy to be eaten, as one muses ‘I think it is immoral to eat other creatures… They may not be as intelligent as you and I. But they have feelings. They know pain and grief and terror.’", "tags": [], "tagged": false, "bg": "#993C1D", "fg": "#FAECE7"}, {"title": "Gate-Crashers, The", "issues": [91], "first": 91, "last": 91, "artist": "Rafael Busom", "writer": "", "serial": "Single", "summary": "Slade and Driscoll gatecrash parties and ruin them, Jan decides to trick them into not coming to her birthday (31 October) and they enter the house opposite, realise all the guests there are dead, revealed that Jan was just keeping front of her house dark ‘No…No escape for you now […] Guests at the party of the long dead may never return to the living!’", "tags": [], "tagged": false, "bg": "#854F0B", "fg": "#FAEEDA"}, {"title": "Your Time Is Up!", "issues": [91], "first": 91, "last": 91, "artist": "José/Juan Ariza", "writer": "", "serial": "Single", "summary": "Anna wishes at an old well to live forever and gets her wish but her body slows down and to her it seems that time has sped up – ‘For countless aeons Anna watched the barren, empty, dark world that was earth, a tear falling from her cheek… slowly’, eventually ‘Then the circle of time came full circle and Anna watched the birth of the world…’ and shouts STOP warning herself not to make the wish.", "tags": [], "tagged": false, "bg": "#185FA5", "fg": "#E6F1FB"}, {"title": "Body Snatchers, The", "issues": [92, 93, 94, 95, 96, 97, 98, 99, 100, 101], "first": 92, "last": 101, "artist": "Maria Barrera Gesali", "writer": "", "serial": "Serial", "summary": "[92] Nancy returns late to school after an illness, man jumps out on her taxi looks like one of her teachers but all well at school though ‘a little bit odd […] a lot of the teachers seem kind of cold and as if they’ve got other things on their minds just now’, told to keep out of derelict manor next door, ends with tramp sneaking into greenhouse to hide and a scream [classic McCloud eg of closure]. [93] Tramp dies and scientists(?) seek more people from school; everyone at school is acting unlike themselves, Nancy becomes suspicious and tells head who muses ‘That girl suspects too much. She will have to be dealt with […] She will be the next to join us… She must be!’ [94] Nancy realises Annie is missing but staff say she was taken ill in night, head goes to body snatcher and says they must take Nancy (off panel, plant-like fist pounding on table), Nancy is drugged with flowers during cross-country and taken off by head and helpers: ‘The Master awaits you!’ [95] Nancy wakes up a prisoner, accuses head of being fake and is told by dr Bracken that they are all his copies and she is only one to notice, testing his serum designed to heal people first on himself and has turned into half plant, then by making other plants – and ‘soon, though, my plans will spread like roots and branches until I rule the whole country…!’ she breaks free and runs off. [96] Nancy flees and chased in corridors, found on camera entering basement, outwits giant ‘man-eating plant’ by moving very slowly and quietly (‘It’s a plant… it can’t see me!’) escapes and hides in plant pod room surrounded by replicas and then gets out – does not notice replica of herself in there too. [97] Nancy returns to school and calls police by climbing up ivy into staffroom, is captured but then escapes with her friend Laura, they go to police but do not realise police are also pod people. [98] Laura and Nancy realise police are plants so jump out of car on way to school, Nancy pushes one into old quarry, they decide to go to Nancy’s family and the police in London, but Dr Bracknell has already figured out this plan. [99] Flowers sent to Nancy’s parents that drug them and they are captured and replaced, taking real parents back to manor house where Nancy and friend are hiding they climb into van headed for London and hide among pod people ‘sightless half people’ ‘cold, clammy bodies’ but when they get there we see phone call from Dr Bracken to parents saying they are going to kill her. [100] Nancy and Laura discover Nancy’s parents have been replaced, and that weedkiller works, she vows to make doctor pay. [101] Nancy rescues her parents, destroys a plant copy of herself, tricks his man-eater into attacking Dr Bracken (he moves) and once he dies no control over plant people, house burns down as police arrive.", "tags": [], "tagged": false, "bg": "#3B6D11", "fg": "#EAF3DE"}, {"title": "Danger Demons At Work", "issues": [92], "first": 92, "last": 92, "artist": "Blas Gallego", "writer": "", "serial": "Single", "summary": "When Betty takes off her glasses she sees demons instead of workmen, overhears them talking about domination and the everflame, she tries to tell everyone but nobody believes her, finally thwarts them by kicking everflame and them back down to hell as parents muse ‘Who on earth is she playing with down there?’ ‘Some new boy she’s met I expect my dear’ but she questions ‘All over? Or will they come up from another hole? Perhaps next time it’ll be YOUR road they’re digging up.’", "tags": [], "tagged": false, "bg": "#72243E", "fg": "#FBEAF0"}, {"title": "Flight From Fear", "issues": [92], "first": 92, "last": 92, "artist": "Isidre Monés", "writer": "", "serial": "Single", "summary": "Plague in London 1665, Lucy sends her maid Peg out to get lavender before they flee the city and she has an accident and so they leave without her, Lucy waits in coach outside inn as she doesn’t want to ‘mix with those country bumpkins’ then deathly coachman takes her coach and brings her to plague pit she wakes up and says they must go back for Peg and they find her safe.", "tags": [], "tagged": false, "bg": "#5F5E5A", "fg": "#F1EFE8"}, {"title": "Ghost Of Yankee Jim, The", "issues": [92], "first": 92, "last": 92, "artist": "Anita Davies", "writer": "", "serial": "Single", "summary": "Lillian sees ghost of Yankee Jim wrongly hanged on ground her house was on in San Diego – after discovering his story lived in house all her life and became fond of him (diaries) (true story retold by Anita Davies re Whaley House).", "tags": [], "tagged": false, "bg": "#A32D2D", "fg": "#FCEBEB"}, {"title": "Long Way From Home", "issues": [92, 93, 94, 95, 96], "first": 92, "last": 96, "artist": "Jesus Redondo", "writer": "", "serial": "Serial", "summary": "[92] Anna and Tracey visiting June at her house in country next to ruined castle, they go to explore nearby Harley House despite story from Old Joe that wood attacked him, find a path and enter house find mummified bodies and locked door behind them, then a model house covered by glass dome which they touch - sucked into it? [93] Touching dome produced a ‘blinding light’ and model house restores itself to newness, as does house around them – servants come back alive, girls try to leave but forest stops them, realise they are trapped there and cannot leave. House like ‘some slumbering hibernating animal that we’ve woken or brought to life’. [94] They go back to house for water for Tracey but Butler refuses to serve them and on being pushed away they realise he is a dried up husk; when given water Tracey panics and also becomes a desiccated mummy. [95] Anna figures out house is draining their lifeforce, June also collapses, Anna follows servants and their mistress now restored to life who are carrying June’s body and finds 6 bodies laid out in pentagram for spell to restore the house and mistress to former glory. [96] Anna collapses and is laid in circle, accuses mistress of never really loving the house just the compliments people paid her on it, and house returns them all to life and collapses in on itself, they get out and save other girls and vow to never go back.", "tags": [], "tagged": false, "bg": "#085041", "fg": "#9FE1CB"}, {"title": "Bone Of Doom, The", "issues": [93], "first": 93, "last": 93, "artist": "Wife brings back piece of bone from Egyptian tomb and bad luck then dogs family.", "writer": "", "serial": "Single", "summary": "", "tags": [], "tagged": false, "bg": "#26215C", "fg": "#CECBF6"}, {"title": "Girl Who Knew The Fairies", "issues": [93], "first": 93, "last": 93, "artist": "José/Juan Ariza", "writer": "", "serial": "Single", "summary": "Lana believes in fairies and tells Carol who comes along to watch the fairy ball with her that night, but is amazed when it proves to be true and she is led off by them ‘Those who see us may not return to tell of it!’ realises they are a tiny race of people living under the earth – next day in school Lana tells everyone where Carol has gone but nobody believes her.", "tags": [], "tagged": false, "bg": "#633806", "fg": "#FAC775"}, {"title": "Window Box, The", "issues": [93], "first": 93, "last": 93, "artist": "Candy is a compulsive thief (‘If folk don’t take better care of their money they deserve to lose it. This is too easy!’) and having tried everything parents buy rose seeds from a gypsy who says they will cure her, she plants them and a few days later tiny roses grow, pricks her finger and has a dream she has shrunk and is warned by gypsy not to steal any more, next time she tries to steal this happens and she quickly returns purse and never steals again ‘It's amazing what a little kindness can do!’ ‘A little kindness, or… a little fear!", "writer": "", "serial": "Single", "summary": "", "tags": ["Dream*"], "tagged": true, "bg": "#534AB7", "fg": "#EEEDFE"}, {"title": "Night Of The Dead", "issues": [94], "first": 94, "last": 94, "artist": "Blas Gallego", "writer": "", "serial": "Single", "summary": "Jilly goes to stay with her gran, before she arrives conversation between gran and other villager that it is her turn to suffer; doesn’t drink cocoa as she doesn’t like it and overhears villagers say she is to be sacrifice against historic witch’s curse, runs away from zombies through graveyard and seeks sanctuary at place where witch was burnt, dead rampage through village kill her gran, in morning she is left alive but in shock and village ‘has joined the dead’", "tags": [], "tagged": false, "bg": "#0F6E56", "fg": "#E1F5EE"}, {"title": "Catch The Moon If You Can", "issues": [95], "first": 95, "last": 95, "artist": "José/Juan Ariza", "writer": "", "serial": "Single", "summary": "Mary given a magic coin by dying grandmother and told she must pass it on within a year, it fills drawer with money every full moon (great panel combining all the luxuries she and her family buy with it) and at end of year she decides not to pass it on ‘But why should I? Who’s to know what Grandmother’s instructions were? I’ll keep the coin myself and it will carry on its magic for us…’ that night she sees coin hovering in air and follows it, nearly falls into sea but warned by her gran reappearing one last time.", "tags": [], "tagged": false, "bg": "#993C1D", "fg": "#FAECE7"}, {"title": "Last Hunt, The", "issues": [95], "first": 95, "last": 95, "artist": "Jorge Badia Romero", "writer": "", "serial": "Single", "summary": "Poor widow and daughter killed by murderous squire on his hunt, after they die he chases two vixens into bog and dies.", "tags": [], "tagged": false, "bg": "#854F0B", "fg": "#FAEEDA"}, {"title": "Pig People, The", "issues": [95], "first": 95, "last": 95, "artist": "John Richardson", "writer": "", "serial": "Single", "summary": "Lorina wants to be beautiful and smart like Pearl and admires her amulet which has come from an ancient cult ‘The Worshippers of the Pig’, steals it and everything starts going right (‘she found she was making the scene at the local disco’) but Pearl sees amulet and warns it has terrible power, Lorina wishes no more gym and gym burns down so she resolves to give it back after one more wish to be beautiful – when she wakes up in morning she has been made beautiful but like a pig (good use of colour and medium, her back to us for final page).", "tags": [], "tagged": false, "bg": "#185FA5", "fg": "#E6F1FB"}, {"title": "Screaming Point", "issues": [95, 96, 97, 98, 99, 100, 101], "first": 95, "last": 101, "artist": "Jorge Badia Romero", "writer": "", "serial": "Serial", "summary": "[95] Lucy is sent away from cruel orphanage to live with her Uncle Seth but when she arrives is only collected by driver/undertaker and no sign of him, locked in for night and made to sleep in a coffin. [96] Lucy sleeps under counter but still has a nightmare she is in a hearse, explores next morning and hears odd noises, her uncle arrives and declares himself a scientist and sends her out to get food for lab animals, when she returns they are leaving and then she hears a strange noise behind one of the doors… [97] Lucy meets Simeon Barrett who is hideous with broken neck and smashes up uncle’s lab to stop him doing cruel experiments she lets animals go because of this and when uncle returns tells him and he says Simeon is a murderer. [98] Lucy is sent out for day and starts to feel suspicious about Simeon after watching puppet show and realising he may have been hung, comes back to find empty coffin and is scared and looks for uncle, sees them through lab window doing some sort of experiment on body [visual only, in distance, we can see as little as her]. [99] Lucy interrupts experiment and sees they are bringing dead back to life, but he dies again shortly afterwards need better blood, she jumps from window and they chase out into streets after her. [100] Giant Simeon saves Lucy and tells her that her uncle Seth is a hangman and experimenting to bring people back to life. [101] Lucy is captured by Uncle Seth but a mob led by Simeon saves her – he gets away though and final panel is unreassuring – Kemp’s shadow over a sign ‘hangman wanted’.", "tags": ["Nightmare*"], "tagged": true, "bg": "#3B6D11", "fg": "#EAF3DE"}, {"title": "Horn The Hounds And The Hunted, The", "issues": [96], "first": 96, "last": 96, "artist": "P. Montero", "writer": "", "serial": "Single", "summary": "Amanda, Barbara and Kevin being pursued by hunting dogs, Kevin caught and torn apart (bit graphic!) then Barbara screams, finally just Amanda cornered by huntsmen (given p of v of them and reaching hands) then she wakes up and it is just a dream and today is ‘our first hunt’ ‘Yes. It’s time to know the call of the horn. The bark of the hounds… the thrill of the hunt – oh!’ ‘No – I will never hunt! / Because now I know the fear of the fox…!’", "tags": ["Dream*", "Wak*"], "tagged": true, "bg": "#72243E", "fg": "#FBEAF0"}, {"title": "House Of Horror", "issues": [96, 97, 98, 99, 100, 101], "first": 96, "last": 101, "artist": "Isidre Monés", "writer": "", "serial": "Serial", "summary": "[96] Joan and Lizzie in workhouse, Joan dies from overwork and is buried, Lizzie sleeps by grave and wakes up to see body being stolen, follows to house and is scared by shadowy figures, revealed to be waxworks owned by Madame Blaze but she knows there is evil there (‘The gentry flock to see my waxworks of infamous criminal and notorious murderers’). [97] Lizzie is offered a maid’s job or will be taken to police, next day she is cleaning and discovers withered bouquet she put in Joan’s coffin on the floor – rock slips from nearest statue and nearly crushes her head. [98] Lizzie is set to work taking tickets to exhibition with wax head of famous hypnotist guarding/watching her, when she tries to escape that night she is transfixed by his eyes and rushes back to the kitchen in fright. [99] Lizzie runs back to room then investigates drumming sound and some missing waxworks, finds Madame like a waxwork and drum beating itself, knocks over a coffin and escapes into tunnel that leads out onto Thames but is trapped by a boat coming in (bandaged feet shown). [100] Lizzie investigates, falls in underground river and is rescued, realises she was rescued by one of the waxworks and they follow beat of drum. [101] Madame Blaze tells Lizzie about her voodoo and that all her waxworks are zombies, lizzie beats drum which summons them but they are out of control, building burns down and Blaze falls off roof and dies, Lizzie escapes – and maybe so do the zombies ‘There are many dark alleys in London where they can hide, and we’ll never know they’re there…until it’s too late!’", "tags": [], "tagged": false, "bg": "#5F5E5A", "fg": "#F1EFE8"}, {"title": "Strange Meeting", "issues": [96], "first": 96, "last": 96, "artist": "Anita Davies", "writer": "", "serial": "Single", "summary": "Karen Jones on way to Gran’s funeral sees Gran’s apparition in car with scar on face who says her mother was a bad daughter and hit her and made her change will – both turn out to be true.", "tags": [], "tagged": false, "bg": "#A32D2D", "fg": "#FCEBEB"}, {"title": "Wishing Bird, The", "issues": [96], "first": 96, "last": 96, "artist": "Carlos Guirado", "writer": "", "serial": "Single", "summary": "Mary given bird by neighbour and everything she wishes on it comes through (it is silently urging her on), makes third wish to be well just in time and bird dies instead.", "tags": [], "tagged": false, "bg": "#085041", "fg": "#9FE1CB"}, {"title": "Power Of Young Melissa, The", "issues": [97], "first": 97, "last": 97, "artist": "Jorge Badia Romero", "writer": "", "serial": "Single", "summary": "Melissa is able to restore those who have died before their time back to life, is caught by
